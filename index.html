<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 01</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form id="form-cadastro" onsubmit="cadastrar(event)">
        <h1>Formulário de Cadastro</h1>
       
        <div class="inputs">
            <div class="grupoLabelInput">
                <label for="input-nome">Nome:</label>
                <input id="input-nome" placeholder="Digite seu nome" type="text" required>
            </div>
            
            <div class="grupoLabelInput">
                <label for="input-email">Email:</label>
                <input id="input-email" placeholder="Digite seu email" type="email" required>
            </div>
            
            <div class="grupoLabelInput">
                <label for="input-senha">Senha:</label>
                <div class="password-wrapper">
                    <input id="input-senha" placeholder="Digite sua senha" type="password" required>
                    <i class="fa-solid fa-eye" id="toggleIcon" onclick="togglePassword()"></i>
                </div>
            </div>
        </div>

        <button id="btn-cadastrar" type="submit">Cadastrar</button>

        <button type="button" onclick="verCadastrados()" class="button-cadastrados">
            Ver Cadastrados
        </button>
    </form>

    <button id="btn-help" class="help" onclick="showHelpMessage()">
        <img src="img/help.svg" alt="Help">
    </button>

    <div id="overlay" class="overlay">
    <div class="modal">
        <p id="mensagem"></p>
        <button type="button" onclick="fecharOverlay()" 

        style="background-color: #0400ff; margin-top: 15px;">Fechar</button>
        
</div>
    <footer>
        Copywright 2026 © Todos os direitos reservados
    </footer>

    <script src="java.js"></script>
</body>
</html>
