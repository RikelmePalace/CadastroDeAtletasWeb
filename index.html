<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Atletas</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="main-container">
        <div class="banner-side">
            <img src="img/Corrida-de-Rua-para-Iniciantes_-5-Dicas-Essenciais-para-Comecar-com-o-Pe-Direito-Banner-Site-1024x597.jpg.webp" alt="Atleta correndo">
        </div>

        <div class="form-side">
            <h1>Cadastro de Atletas</h1>
            
            <div class="form-card">
                <h2>Preencha seu nome para continuar</h2>
                
                <form id="cadastroForm">
                    <div class="input-group">
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" placeholder="Digite seu nome" required>
                    </div>
                    <button type="submit" id="btnContinuar">Continuar</button>
                </form>
            </div>
        </div>
    </div>

    <button id="btn-help" class="help">
        <img src="img/help.svg" alt="Help">
    </button>

    <div id="toast" class="toast-container">
        <span id="toast-message">Por favor, digite um nome válido</span>
    </div>

    <footer>
        Copyright 2026 © Todos os direitos reservados
    </footer>

    <script src="JAVA/java.js"></script>
</body>
</html>
