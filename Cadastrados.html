<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Usuários cadastrados</title>
    <link rel="stylesheet" href="style.css">

    <style>

        .container {
            background-color:rgb(255, 225, 186);
            padding: 30px;
            border-radius: 7px;
            width: 400px;
            margin: 100px auto;
            box-shadow: 0px 10px 20px rgb(255, 181, 22);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: show 1s ease-in-out;
        }
        
        ul { 
            list-style: none; 
            margin-top: 20px; 
            width: 100%; 
        }
        
        li { 
            padding: 10px; 
            border-bottom: 1px solid #0011ff; 
        }
        
        .voltar { 
            margin-top: 20px; 
            background-color: rgb(0, 26, 255); 
            width: auto; 
            margin-right: auto; 
        }
        
        .voltar:hover { 
            background-color: rgb(0, 12, 121); 
        }

        .Limpar { 
            margin-top: 10px; 
            background-color: rgb(255, 0, 0); 
            width: auto;
            margin-left: auto; 
        }
        .Limpar:hover { 
            background-color: rgb(121, 0, 0); 
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Usuários cadastrados</h1>
        <ul id="listaUsuarios"></ul>
        
    <div class="botoes">
        <button class="voltar" onclick="voltar()">Voltar</button>
        <button class="Limpar" onclick="limparLista()">Limpar</button>
    </div>

    <script src="java.js"></script>
</body>
</html>
